<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVD Bouncing Ball - Color Changer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const ballRadius = 25;

        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;

        // Speed in pixels per second (matching original: 300 and 240)
        let speedX = 300;
        let speedY = 240;

        // Start color: magenta
        let ballColor = '#ff00ff';

        function getRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return `rgb(${r}, ${g}, ${b})`;
        }

        let lastTime = null;

        function draw(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const elapsed = (timestamp - lastTime) / 1000; // seconds
            lastTime = timestamp;

            // Move ball using delta time (same as fElapsedTime in original)
            ballX += speedX * elapsed;
            ballY += speedY * elapsed;

            // Bounce off left/right edges + change color
            if (ballX + ballRadius >= canvas.width || ballX - ballRadius <= 0) {
                speedX *= -1;
                ballColor = getRandomColor();
            }

            // Bounce off top/bottom edges + change color
            if (ballY + ballRadius >= canvas.height || ballY - ballRadius <= 0) {
                speedY *= -1;
                ballColor = getRandomColor();
            }

            // Clear screen
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = ballColor;
            ctx.fill();
            ctx.closePath();

            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>
</html>
